name: Metadata

on:
  push:
    branches:
      - main
    paths:
      - metadata/metadata.ts
      - metadata/generateImages.ts
      - metadata/generateMetadata.ts
      - src/features/game/types/index.ts
      - src/features/game/types/images.ts
      - src/features/game/types/collectibleItemBuffs.ts
      - src/assets/**
      - public/erc1155/images/3x3_bg.png
      - public/erc1155/images/boost.png
      - public/wearables/images/**

jobs:
  metadata:
    runs-on: ubuntu-latest
    environment: develop
    concurrency: testnet-metadata

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TRANSLATOR_GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: yarn install

      - name: Run metadata script
        run: yarn metadata

      - name: Generate collectible images
        run: yarn images

      - name: Configure Git user
        run: |
          git config --global user.name "Metadata Bot"
          git config --global user.email "metadata@sunflower-land.com"

      - name: Pull latest changes
        run: |
          git fetch origin
          git pull origin main

      - uses: EndBug/add-and-commit@v9
        with:
          message: "[BOT] Update metadata and images [skip ci]"
          committer_name: Metadata Bot
          committer_email: metadata@sunflower-land.com
          add: |
            public/erc1155/*.json
            public/erc1155/images/*.webp
            public/erc1155/images/.manifest.json
          commit: --no-verify
